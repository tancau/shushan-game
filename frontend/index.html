<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="蜀山剑侠传 - 沉浸式文字修仙游戏，体验从凡人到仙人的修炼之路">
    <meta name="keywords" content="修仙,文字游戏,蜀山,剑侠,修真,仙侠">
    <meta name="theme-color" content="#0F1419">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" as="style">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap">
    <title>蜀山剑侠传</title>
    <style>
      html { background-color: #0F1419; }
      body { margin: 0; background-color: #0F1419; }
      #app { min-height: 100vh; background-color: #0F1419; }
      .loading-screen {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0F1419;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      .loading-screen.hidden { opacity: 0; pointer-events: none; }
      .loading-screen__spinner {
        width: 48px;
        height: 48px;
        border: 3px solid rgba(45, 90, 123, 0.3);
        border-top-color: #2D5A7B;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      .loading-screen__text {
        margin-top: 16px;
        color: #9CA3AF;
        font-size: 14px;
        font-family: 'Noto Serif SC', serif;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="loading-screen" id="loading-screen">
        <div class="loading-screen__spinner"></div>
        <div class="loading-screen__text">正在进入修仙世界...</div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      window.addEventListener('load', function() {
        const loader = document.getElementById('loading-screen');
        if (loader) {
          setTimeout(() => loader.classList.add('hidden'), 300);
          setTimeout(() => loader.remove(), 800);
        }
      });
    </script>
  </body>
</html>
